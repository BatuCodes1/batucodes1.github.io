<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>YKS Fizik Formülleri</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Crimson+Pro:ital,wght@0,300;0,600;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --card: #1a1a26;
    --border: #2a2a3e;
    --accent: #7c6af7;
    --accent2: #f76a8a;
    --accent3: #6af7c8;
    --text: #e8e8f0;
    --muted: #6b6b88;
    --tyt: #f7c26a;
    --ayt: #6af7c8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  button { touch-action: manipulation; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* NOISE TEXTURE */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10,10,15,0.92);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    gap: 1rem;
  }

  .logo {
    font-family: 'Space Mono', monospace;
    font-size: 1.1rem;
    color: var(--accent);
    letter-spacing: -0.02em;
    flex-shrink: 0;
  }
  .logo span { color: var(--accent2); }

  .header-center {
    flex: 1;
    display: flex;
    justify-content: center;
  }

  .header-right {
    display: flex;
    gap: 0.5rem;
    align-items: center;
    flex-shrink: 0;
  }
  .search-bar {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.45rem 1rem;
    width: 260px;
    transition: width 0.38s cubic-bezier(0.4,0,0.2,1),
                border-color 0.25s ease,
                background 0.25s ease,
                box-shadow 0.25s ease,
                border-radius 0.25s ease;
  }
  .search-bar:focus-within {
    border-color: var(--accent);
    background: rgba(124,106,247,0.07);
    box-shadow: 0 0 0 3px rgba(124,106,247,0.15), 0 4px 24px rgba(124,106,247,0.12);
    width: 320px;
    border-radius: 12px;
  }
  .search-bar input {
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    width: 100%;
    transition: font-size 0.2s ease;
  }
  .search-bar:focus-within input { font-size: 0.95rem; }
  .search-bar input::placeholder { color: var(--muted); transition: color 0.2s; }
  .search-bar:focus-within input::placeholder { color: rgba(107,107,136,0.45); }
  .search-icon {
    color: var(--muted);
    font-size: 0.9rem;
    flex-shrink: 0;
    transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1), color 0.2s;
  }
  .search-bar:focus-within .search-icon {
    color: var(--accent);
    transform: scale(1.25) rotate(-10deg);
  }

  .welcome-type {
    font-family: 'Crimson Pro', serif;
    font-style: italic;
    font-weight: 300;
    font-size: 1.2rem;
    letter-spacing: 0.05em;
    color: var(--accent3);
    white-space: nowrap;
    overflow: hidden;
  }
  .badge-filter {
    padding: 0.3rem 0.8rem;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid transparent;
    transition: all 0.2s;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .badge-filter.tyt { border-color: var(--tyt); color: var(--tyt); }
  .badge-filter.tyt.active, .badge-filter.tyt:hover { background: var(--tyt); color: #0a0a0f; }
  .badge-filter.ayt { border-color: var(--ayt); color: var(--ayt); }
  .badge-filter.ayt.active, .badge-filter.ayt:hover { background: var(--ayt); color: #0a0a0f; }
  .badge-filter.all { border-color: var(--accent); color: var(--accent); }
  .badge-filter.all.active, .badge-filter.all:hover { background: var(--accent); color: #fff; }

  /* HERO */
  .hero {
    text-align: center;
    padding: 4rem 2rem 2rem;
    position: relative;
  }
  .hero-glow {
    position: absolute;
    top: 0; left: 50%; transform: translateX(-50%);
    width: 600px; height: 300px;
    background: radial-gradient(ellipse, rgba(124,106,247,0.15) 0%, transparent 70%);
    pointer-events: none;
  }
  .hero h1 {
    font-family: 'Crimson Pro', serif;
    font-size: clamp(2.5rem, 6vw, 4.5rem);
    font-weight: 300;
    line-height: 1.1;
    letter-spacing: -0.02em;
    margin-bottom: 1rem;
  }
  .hero h1 em { font-style: italic; color: var(--accent); }
  .hero p { color: var(--muted); font-size: 1rem; max-width: 500px; margin: 0 auto 2rem; }

  .stats-row {
    display: flex;
    justify-content: center;
    gap: 3rem;
    margin-bottom: 1rem;
  }
  .stat { text-align: center; }
  .stat-num {
    font-family: 'Space Mono', monospace;
    font-size: 1.6rem;
    color: var(--accent);
    display: block;
  }
  .stat-label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; }

  /* LAYOUT */
  .main-layout {
    display: grid;
    grid-template-columns: 260px 1fr;
    gap: 0;
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 1rem 4rem;
  }

  /* SIDEBAR */
  .sidebar {
    position: sticky;
    top: 64px;
    height: calc(100vh - 64px);
    overflow-y: auto;
    padding: 1.5rem 1rem;
    border-right: 1px solid var(--border);
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .sidebar-section { margin-bottom: 1.5rem; }
  .sidebar-title {
    font-size: 0.65rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.15em;
    margin-bottom: 0.5rem;
    padding-left: 0.5rem;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0.5rem 0.8rem;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
    font-size: 0.875rem;
    color: var(--muted);
    margin-bottom: 2px;
    border: 1px solid transparent;
  }
  .nav-item:hover { background: var(--card); color: var(--text); }
  .nav-item.active { background: rgba(124,106,247,0.15); color: var(--accent); border-color: rgba(124,106,247,0.3); }
  .nav-item .nav-icon { font-size: 1rem; width: 20px; text-align: center; }
  .nav-item .nav-badge {
    margin-left: auto;
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    padding: 1px 5px;
    border-radius: 3px;
    background: var(--border);
    color: var(--muted);
  }
  .nav-item.active .nav-badge { background: rgba(124,106,247,0.3); color: var(--accent); }
  .nav-tyt .nav-badge { background: rgba(247,194,106,0.15); color: var(--tyt); }
  .nav-ayt .nav-badge { background: rgba(106,247,200,0.15); color: var(--ayt); }

  /* CONTENT */
  .content { padding: 1.5rem 2rem; }

  /* TOPIC SECTION */
  .topic-section { margin-bottom: 3rem; animation: fadeIn 0.4s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }

  .topic-header {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 1.2rem;
    padding-bottom: 0.8rem;
    border-bottom: 1px solid var(--border);
  }
  .topic-icon { font-size: 1.8rem; }
  .topic-title-group h2 {
    font-family: 'Crimson Pro', serif;
    font-size: 1.6rem;
    font-weight: 600;
    letter-spacing: -0.02em;
  }
  .topic-title-group p { color: var(--muted); font-size: 0.8rem; }
  .topic-level {
    margin-left: auto;
    display: flex;
    gap: 0.3rem;
  }
  .level-pill {
    font-size: 0.65rem;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 20px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .level-pill.tyt { background: rgba(247,194,106,0.15); color: var(--tyt); border: 1px solid rgba(247,194,106,0.3); }
  .level-pill.ayt { background: rgba(106,247,200,0.15); color: var(--ayt); border: 1px solid rgba(106,247,200,0.3); }

  /* FORMULA GRID */
  .formula-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 1rem;
  }

  .formula-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.2rem;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
    cursor: pointer;
  }
  .formula-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    opacity: 0;
    transition: opacity 0.2s;
  }
  .formula-card:hover { border-color: rgba(124,106,247,0.4); transform: translateY(-2px); box-shadow: 0 8px 32px rgba(124,106,247,0.1); }
  .formula-card:hover::before { opacity: 1; }
  .formula-card.bookmarked { border-color: rgba(247,194,106,0.4); }
  .formula-card.bookmarked::before { background: linear-gradient(90deg, var(--tyt), var(--accent2)); opacity: 1; }

  .formula-name {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin-bottom: 0.6rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .formula-name .bm-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--muted);
    font-size: 0.9rem;
    transition: color 0.2s;
    padding: 0;
  }
  .formula-name .bm-btn:hover, .formula-name .bm-btn.active { color: var(--tyt); }

  .formula-eq {
    font-family: 'Space Mono', monospace;
    font-size: 1.1rem;
    color: var(--text);
    margin-bottom: 0.8rem;
    line-height: 1.6;
    background: rgba(255,255,255,0.03);
    padding: 0.6rem 0.8rem;
    border-radius: 6px;
    border-left: 2px solid var(--accent);
  }
  .formula-eq sub, .formula-eq sup { font-size: 0.7em; }

  .formula-vars {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
    margin-bottom: 0.8rem;
  }
  .var-tag {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    padding: 2px 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--accent3);
  }
  .var-tag span { color: var(--muted); }

  .formula-note {
    font-size: 0.78rem;
    color: var(--muted);
    line-height: 1.5;
    border-top: 1px solid var(--border);
    padding-top: 0.6rem;
    display: none;
  }
  .formula-card.expanded .formula-note { display: block; }
  .expand-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--muted);
    font-size: 0.72rem;
    margin-top: 0.5rem;
    padding: 0;
    transition: color 0.2s;
    display: flex;
    align-items: center;
    gap: 0.3rem;
  }
  .expand-btn:hover { color: var(--accent); }

  /* PROGRESS BAR */
  .progress-section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1rem 1.5rem;
    margin-bottom: 2rem;
  }
  .progress-title { font-size: 0.8rem; color: var(--muted); margin-bottom: 0.5rem; }
  .progress-bar-outer { background: var(--border); border-radius: 4px; height: 6px; overflow: hidden; }
  .progress-bar-inner { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 4px; transition: width 0.4s; }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--muted);
    display: none;
  }
  .empty-state.visible { display: block; }
  .empty-state h3 { font-size: 1.2rem; margin-bottom: 0.5rem; color: var(--text); }

  /* QUICK QUIZ */
  .quiz-banner {
    background: linear-gradient(135deg, rgba(124,106,247,0.15), rgba(247,106,138,0.1));
    border: 1px solid rgba(124,106,247,0.3);
    border-radius: 12px;
    padding: 1.2rem 1.5rem;
    margin-bottom: 2rem;
    display: flex;
    align-items: center;
    gap: 1rem;
  }
  .quiz-icon { font-size: 2rem; }
  .quiz-text h3 { font-size: 1rem; font-weight: 500; margin-bottom: 0.2rem; }
  .quiz-text p { font-size: 0.8rem; color: var(--muted); }
  .quiz-btn {
    margin-left: auto;
    background: var(--accent);
    color: white;
    border: none;
    padding: 0.5rem 1.2rem;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    white-space: nowrap;
    transition: opacity 0.2s;
  }
  .quiz-btn:hover { opacity: 0.85; }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    z-index: 1000;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2rem;
    max-width: 480px;
    width: 90%;
    position: relative;
  }
  .modal h3 { font-family: 'Crimson Pro', serif; font-size: 1.6rem; margin-bottom: 0.3rem; }
  .modal-q { color: var(--muted); font-size: 0.9rem; margin-bottom: 1.5rem; }
  .modal-formula {
    font-family: 'Space Mono', monospace;
    font-size: 1.1rem;
    background: var(--surface);
    padding: 1rem;
    border-radius: 8px;
    text-align: center;
    margin-bottom: 1.5rem;
    border-left: 3px solid var(--accent);
  }
  .quiz-options { display: grid; gap: 0.6rem; }
  .quiz-option {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.7rem 1rem;
    cursor: pointer;
    font-family: 'Space Mono', monospace;
    font-size: 0.9rem;
    text-align: left;
    color: var(--text);
    transition: all 0.15s;
  }
  .quiz-option:hover { border-color: var(--accent); background: rgba(124,106,247,0.08); }
  .quiz-option.correct { border-color: var(--ayt); background: rgba(106,247,200,0.1); color: var(--ayt); }
  .quiz-option.wrong { border-color: var(--accent2); background: rgba(247,106,138,0.1); color: var(--accent2); }
  .quiz-result { text-align: center; padding: 1rem; font-size: 0.9rem; color: var(--muted); display: none; }
  .quiz-result.show { display: block; }
  .close-modal {
    position: absolute;
    top: 1rem; right: 1rem;
    background: none; border: none;
    color: var(--muted); cursor: pointer;
    font-size: 1.2rem;
  }
  .modal-btns { display: flex; gap: 0.5rem; margin-top: 1rem; }
  .modal-btn {
    flex: 1;
    padding: 0.6rem;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    transition: opacity 0.2s;
    display: none;
  }
  .modal-btn.show { display: block; }
  .modal-btn.next { background: var(--accent); color: white; }
  .modal-btn.exit { background: var(--surface); color: var(--muted); border: 1px solid var(--border); }
  .modal-btn:hover { opacity: 0.85; }

  @media (max-width: 768px) {
    .main-layout { grid-template-columns: 1fr; }
    .sidebar { position: relative; height: auto; border-right: none; border-bottom: 1px solid var(--border); padding: 1rem; -webkit-overflow-scrolling: touch; }
    .sidebar-section:not(:first-child) { display: none; }
    header { padding: 0 0.75rem; gap: 0.4rem; }
    .welcome-type { font-size: 0.95rem; }
    .logo { font-size: 0.95rem; }
    .header-center { flex: unset; }
    .search-bar { width: 160px; }
    .search-bar.expanded { width: calc(100vw - 1.5rem); }
    .content { padding: 0.75rem; }
    .formula-grid { grid-template-columns: 1fr; }
    .formula-eq { font-size: 0.95rem; word-break: break-word; overflow-wrap: anywhere; }
    .quiz-option { font-size: 0.8rem; word-break: break-word; }
    .modal { padding: 1.25rem; width: 95%; }
    .bm-btn { min-width: 28px; min-height: 28px; display: flex; align-items: center; justify-content: center; }
    .stats-row { gap: 1.5rem; }
    .hero { padding: 2.5rem 1rem 1.5rem; }
    /* hide header sides when search is active on mobile */
    header.search-active .logo,
    header.search-active .header-right { 
      opacity: 0; 
      pointer-events: none; 
      width: 0; 
      overflow: hidden;
      margin: 0;
      padding: 0;
    }
    header.search-active .header-center { flex: 1; }
  }

  @media (max-width: 380px) {
    .logo { font-size: 0.85rem; }
    .search-bar { width: 120px; }
  }

  /* smooth transitions for hide/show */
  .logo, .header-right {
    transition: opacity 0.25s ease, width 0.3s ease;
  }
</style>
</head>
<body>

<header>
  <div class="logo">φ<span>YKS</span>.fizik</div>
  <div class="header-center">
    <div class="search-bar">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Formül veya konu ara...">
    </div>
  </div>
  <div class="header-right">
    <div class="welcome-type" id="welcomeType"></div>
  </div>
</header>

<div class="hero">
  <div class="hero-glow"></div>
  <h1>YKS Fizik<br><em>Tüm Formüller</em></h1>
  <p>Bu sitenin tasarımı,kodlaması Batuhan Sarısakal tarafından yapılmıştır.</p>
  <div class="stats-row">
    <div class="stat"><span class="stat-num" id="totalCount">0</span><span class="stat-label">Formül</span></div>
    <div class="stat"><span class="stat-num" id="topicCount">0</span><span class="stat-label">Konu</span></div>
    <div class="stat"><span class="stat-num" id="bookmarkCount">0</span><span class="stat-label">Kaydedilen</span></div>
  </div>
</div>

<div class="main-layout">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="content" id="mainContent"></main>
</div>

<footer style="
  text-align: center;
  padding: 2.5rem 1rem;
  border-top: 1px solid #2a2a3e;
  margin-top: 1rem;
  background: rgba(10,10,15,0.6);
">
  <span style="
    font-family: 'Crimson Pro', serif;
    font-style: italic;
    font-weight: 300;
    font-size: 1.05rem;
    background: linear-gradient(90deg, rgb(180, 120, 255), rgb(255, 100, 150), rgb(100, 220, 255));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 0.04em;
  ">Created by Batuhan</span>
</footer>

<div class="modal-overlay" id="quizModal">
  <div class="modal">
    <button class="close-modal" onclick="closeQuiz()">✕</button>
    <h3>⚡ Hızlı Quiz</h3>
    <p class="modal-q" id="quizQ"></p>
    <div class="modal-formula" id="quizFormula"></div>
    <div class="quiz-options" id="quizOptions"></div>
    <div class="quiz-result" id="quizResult"></div>
    <div class="modal-btns">
      <button class="modal-btn next" id="nextBtn" onclick="nextQuiz()">Sonraki →</button>
      <button class="modal-btn exit" id="exitBtn" onclick="closeQuiz()">Çıkış</button>
    </div>
  </div>
</div>

<script>
const DATA = [
  {
    id: 'hareket',
    icon: '🚀',
    title: 'Kinematik — Hareket',
    subtitle: 'Düzgün ve ivmeli hareket denklemleri',
    levels: ['tyt','ayt'],
    formulas: [

      { name: 'Foton Enerjisi (Planck)', eq: 'E = h·f = h·c/λ', vars: [['h','6,626×10⁻³⁴ J·s'],['f','frekans (Hz)'],['c','3×10⁸ m/s'],['λ','dalga boyu (m)']], note: '1 eV = 1,6×10⁻¹⁹ J. Işığın hem dalga hem parçacık özelliği vardır (dalga-parçacık dualitesi).' },
      { name: 'Fotoelektrik Etki', eq: 'E_k = h·f − φ = h·f − h·f₀', vars: [['E_k','sökülen elektronun kinetik enerjisi'],['φ','iş fonksiyonu (J veya eV)'],['f₀','eşik frekansı']], note: 'f < f₀ ise ışık şiddeti ne olursa olsun elektron sökülmez.' },
      { name: 'De Broglie Madde Dalgası', eq: 'λ = h / p = h / (m·v)', vars: [['λ','madde dalgaboyu (m)'],['p','momentum (kg·m/s)']], note: 'Her madde parçacığının bir dalga boyu vardır. Büyük kütlelerde ihmal edilebilir düzeydedir.' },
      { name: 'Bohr Modeli — Enerji', eq: 'Eₙ = −13,6 / n²  (eV)', vars: [['n','baş kuantum sayısı (n=1,2,3…)']], note: 'n=1: temel hal (−13,6 eV). Negatif işaret: bağlı elektron. İyonizasyon enerjisi = 13,6 eV.' },
      { name: 'Bohr Modeli — Yarıçap', eq: 'rₙ = n²·a₀   |   a₀ = 0,053 nm', vars: [['a₀','Bohr yarıçapı = 5,3×10⁻¹¹ m'],['n','kuantum sayısı']], note: 'n arttıkça yörünge yarıçapı n² ile büyür.' },
      { name: 'Spektral Geçiş Enerjisi', eq: 'ΔE = Eₙ₂ − Eₙ₁ = h·f = h·c/λ', vars: [['ΔE','enerji farkı'],['f','yayılan/soğurulan foton frekansı']], note: 'Elektron üst seviyeden alta inerken foton yayar, alttan üste çıkarken soğurur.' },
      { name: 'Radyoaktif Bozunma', eq: 'N(t) = N₀ · (½)^(t/T½)   |   A = λ·N', vars: [['N₀','başlangıç nükleon sayısı'],['T½','yarı ömür (s)'],['A','aktivite (Bq)'],['λ','bozunma sabiti']], note: 'Her T½ sürede aktivite ve atom sayısı yarıya düşer. λ = ln2/T½' },
      { name: 'Kütle-Enerji Denkliği', eq: 'E = Δm · c²', vars: [['Δm','kütle defekti (kg)'],['c','3×10⁸ m/s']], note: '1 u = 931,5 MeV/c². Nükleer reaksiyonlarda Δm bağlanma enerjisini verir.' },
    ]
  },
];

let activeLevel = 'all';
let searchTerm = '';
let bookmarks = JSON.parse(localStorage.getItem('phyBookmarks') || '[]');
let quizQueue = [];
let quizIndex = 0;
let answered = false;

function buildSidebar() {
  const nav = document.getElementById('sidebar');
  let html = '';
  const tytTopics = DATA.filter(t => t.levels.includes('tyt'));
  const aytOnlyTopics = DATA.filter(t => t.levels.includes('ayt') && !t.levels.includes('tyt'));
  html += `<div class="sidebar-section">
    <div class="sidebar-title">Genel</div>
    <div class="nav-item active" onclick="scrollToAll(this)" id="navAll">
      <span class="nav-icon">📚</span> Tüm Konular
      <span class="nav-badge">${DATA.reduce((s,t)=>s+t.formulas.length,0)}</span>
    </div>
    <div class="nav-item" onclick="scrollToBookmarks(this)">
      <span class="nav-icon">⭐</span> Kaydedilenler
      <span class="nav-badge" id="navBmCount">${bookmarks.length}</span>
    </div>
  </div>`;
  html += `<div class="sidebar-section"><div class="sidebar-title">TYT Konuları</div>`;
  tytTopics.forEach(t => {
    html += `<div class="nav-item nav-tyt" onclick="scrollToTopic('${t.id}',this)">
      <span class="nav-icon">${t.icon}</span> ${t.title.split('—')[0].trim()}
      <span class="nav-badge">${t.formulas.length}</span>
    </div>`;
  });
  html += `</div><div class="sidebar-section"><div class="sidebar-title">Sadece AYT</div>`;
  aytOnlyTopics.forEach(t => {
    html += `<div class="nav-item nav-ayt" onclick="scrollToTopic('${t.id}',this)">
      <span class="nav-icon">${t.icon}</span> ${t.title.split('—')[0].trim()}
      <span class="nav-badge">${t.formulas.length}</span>
    </div>`;
  });
  html += `</div>`;
  nav.innerHTML = html;
}

function buildContent() {
  const main = document.getElementById('mainContent');
  let filtered = DATA.filter(topic => {
    if (activeLevel !== 'all' && !topic.levels.includes(activeLevel)) return false;
    if (searchTerm) {
      const s = searchTerm.toLowerCase();
      return topic.title.toLowerCase().includes(s) ||
        topic.formulas.some(f => f.name.toLowerCase().includes(s) || f.eq.toLowerCase().includes(s) ||
          f.vars.some(v => v[0].toLowerCase().includes(s)));
    }
    return true;
  });

  let total = DATA.reduce((s,t)=>s+t.formulas.length,0);
  let topicCount = DATA.length;
  document.getElementById('totalCount').textContent = total;
  document.getElementById('topicCount').textContent = topicCount;
  document.getElementById('bookmarkCount').textContent = bookmarks.length;
  document.getElementById('navBmCount').textContent = bookmarks.length;

  if (filtered.length === 0) {
    main.innerHTML = `<div class="empty-state visible"><h3>Sonuç bulunamadı 🔍</h3><p>"${searchTerm}" için formül bulunamadı.</p></div>`;
    return;
  }

  let allQuizFormulas = DATA.flatMap(t => t.formulas.map(f => ({...f, topic: t.title})));
  let html = `
  <div class="progress-section">
    <div class="progress-title">Kaydedilen formüller — ${bookmarks.length} / ${total}</div>
    <div class="progress-bar-outer"><div class="progress-bar-inner" style="width:${total>0?(bookmarks.length/total*100):0}%"></div></div>
  </div>
  <div class="quiz-banner">
    <span class="quiz-icon">🎯</span>
    <div class="quiz-text">
      <h3>Formülleri Test Et</h3>
      <p>Karışık quiz ile kendini sına — hangisini biliyorsun?</p>
    </div>
    <button class="quiz-btn" onclick="startQuiz()">Quiz Başlat</button>
  </div>`;

  filtered.forEach(topic => {
    let formulas = topic.formulas;
    if (searchTerm) {
      const s = searchTerm.toLowerCase();
      formulas = formulas.filter(f =>
        f.name.toLowerCase().includes(s) || f.eq.toLowerCase().includes(s) ||
        f.vars.some(v => v[0].toLowerCase().includes(s))
      );
    }
    if (formulas.length === 0) return;
    html += `<div class="topic-section" id="section-${topic.id}">
      <div class="topic-header">
        <span class="topic-icon">${topic.icon}</span>
        <div class="topic-title-group">
          <h2>${topic.title}</h2>
          <p>${topic.subtitle}</p>
        </div>
        <div class="topic-level">
          ${topic.levels.includes('tyt') ? '<span class="level-pill tyt">TYT</span>' : ''}
          ${topic.levels.includes('ayt') ? '<span class="level-pill ayt">AYT</span>' : ''}
        </div>
      </div>
      <div class="formula-grid">`;
    formulas.forEach((f, fi) => {
      const fid = `${topic.id}-${fi}`;
      const bm = bookmarks.includes(fid);
      html += `<div class="formula-card${bm?' bookmarked':''}" id="card-${fid}">
        <div class="formula-name">
          ${f.name}
          <button class="bm-btn${bm?' active':''}" onclick="toggleBM(event,'${fid}')" title="Kaydet">⭐</button>
        </div>
        <div class="formula-eq">${f.eq}</div>`;
      if (f.vars.length > 0) {
        html += `<div class="formula-vars">`;
        f.vars.forEach(v => {
          html += `<span class="var-tag">${v[0]}<span> = ${v[1]}</span></span>`;
        });
        html += `</div>`;
      }
      if (f.note) {
        html += `<button class="expand-btn" onclick="toggleExpand(this,'card-${fid}')">ℹ️ Açıklama</button>
        <div class="formula-note">${f.note}</div>`;
      }
      html += `</div>`;
    });
    html += `</div></div>`;
  });

  main.innerHTML = html;
}

function toggleBM(e, fid) {
  e.stopPropagation();
  const btn = e.currentTarget;
  const card = document.getElementById('card-'+fid);
  if (bookmarks.includes(fid)) {
    bookmarks = bookmarks.filter(b => b !== fid);
    btn.classList.remove('active');
    card.classList.remove('bookmarked');
  } else {
    bookmarks.push(fid);
    btn.classList.add('active');
    card.classList.add('bookmarked');
  }
  localStorage.setItem('phyBookmarks', JSON.stringify(bookmarks));
  document.getElementById('bookmarkCount').textContent = bookmarks.length;
  document.getElementById('navBmCount').textContent = bookmarks.length;
  document.querySelector('.progress-bar-inner').style.width = (bookmarks.length/DATA.reduce((s,t)=>s+t.formulas.length,0)*100)+'%';
}

function toggleExpand(btn, cardId) {
  const card = document.getElementById(cardId);
  card.classList.toggle('expanded');
  btn.textContent = card.classList.contains('expanded') ? '▲ Gizle' : 'ℹ️ Açıklama';
}

function filterLevel(level, btn) {
  activeLevel = level;
  document.querySelectorAll('.badge-filter').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  buildContent();
}

function scrollToTopic(id, navEl) {
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  if (navEl) navEl.classList.add('active');
  buildContent();
  setTimeout(() => {
    const el = document.getElementById('section-'+id);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 50);
}

function scrollToAll(navEl) {
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  if (navEl) navEl.classList.add('active');
  activeLevel = 'all';
  document.querySelectorAll('.badge-filter').forEach(b => b.classList.remove('active'));
  document.querySelector('.badge-filter.all').classList.add('active');
  buildContent();
  window.scrollTo({top:0, behavior:'smooth'});
}

function scrollToBookmarks() {
  // highlight bookmarked
  document.querySelectorAll('.formula-card').forEach(c => {
    if (!c.classList.contains('bookmarked')) c.style.opacity = '0.3';
    else c.style.opacity = '1';
  });
  setTimeout(() => {
    document.querySelectorAll('.formula-card').forEach(c => c.style.opacity = '');
  }, 2000);
  const first = document.querySelector('.formula-card.bookmarked');
  if (first) first.scrollIntoView({behavior:'smooth', block:'center'});
}

// QUIZ
function startQuiz() {
  const all = DATA.flatMap((t,ti) => t.formulas.map((f,fi) => ({
    ...f, topicTitle: t.title, fid: `${t.id}-${fi}`
  })));
  quizQueue = all.sort(() => Math.random()-0.5).slice(0, 10);
  quizIndex = 0;
  showQuiz();
  document.getElementById('quizModal').classList.add('open');
}

function showQuiz() {
  answered = false;
  const q = quizQueue[quizIndex];
  document.getElementById('quizQ').textContent = `Soru ${quizIndex+1} / ${quizQueue.length} — "${q.name}" formülü hangisi?`;
  document.getElementById('quizFormula').textContent = q.name + ' — ' + q.topicTitle;
  document.getElementById('quizResult').className = 'quiz-result';
  document.getElementById('nextBtn').className = 'modal-btn next';
  document.getElementById('exitBtn').className = 'modal-btn exit show';

  // Pick 3 wrong answers
  const allFormulas = DATA.flatMap(t => t.formulas.map(f => f.eq));
  let wrongs = allFormulas.filter(eq => eq !== q.eq).sort(() => Math.random()-0.5).slice(0,3);
  let options = [...wrongs, q.eq].sort(() => Math.random()-0.5);
  let optHTML = '';
  options.forEach((opt, idx) => {
    optHTML += `<button class="quiz-option" data-opt="${idx}" onclick="checkAnswerByIdx(this,${idx})">
      ${opt}
    </button>`;
  });
  document.getElementById('quizOptions').innerHTML = optHTML;
  // store options on window for retrieval
  window._quizOptions = options;
  window._quizCorrect = q.eq;
}

function checkAnswerByIdx(btn, idx) {
  const chosen = window._quizOptions[idx];
  const correct = window._quizCorrect;
  checkAnswer(btn, chosen, correct);
}

function checkAnswer(btn, chosen, correct) {
  if (answered) return;
  answered = true;
  const opts = document.querySelectorAll('.quiz-option');
  opts.forEach((o, i) => {
    if (window._quizOptions[i] === correct) o.classList.add('correct');
  });
  if (chosen !== correct) btn.classList.add('wrong');
  const result = document.getElementById('quizResult');
  result.textContent = chosen === correct ? '✅ Doğru! Harika!' : `❌ Yanlış. Doğru cevap: ${correct}`;
  result.className = 'quiz-result show';
  document.getElementById('nextBtn').className = 'modal-btn next show';
}

function nextQuiz() {
  quizIndex++;
  if (quizIndex >= quizQueue.length) {
    closeQuiz();
    return;
  }
  showQuiz();
}

function closeQuiz() {
  document.getElementById('quizModal').classList.remove('open');
}

// SEARCH
document.getElementById('searchInput').addEventListener('input', function() {
  searchTerm = this.value.trim();
  buildContent();
});

// MOBİL: arama kutusuna focus'ta logo ve welcome gizle
const searchInput = document.getElementById('searchInput');
const headerEl = document.querySelector('header');
const isMobile = () => window.innerWidth <= 768;

searchInput.addEventListener('focus', function() {
  if (isMobile()) {
    headerEl.classList.add('search-active');
    this.closest('.search-bar').classList.add('expanded');
  }
});
searchInput.addEventListener('blur', function() {
  if (isMobile()) {
    headerEl.classList.remove('search-active');
    this.closest('.search-bar').classList.remove('expanded');
  }
});

buildSidebar();
buildContent();

// HOŞ GELDİNİZ — JS typewriter, cursor yok, sadece bir kez
(function() {
  const el = document.getElementById('welcomeType');
  const text = 'Hoş Geldiniz';
  let i = 0;
  function type() {
    if (i <= text.length) {
      el.textContent = text.slice(0, i);
      i++;
      setTimeout(type, 75);
    }
  }
  setTimeout(type, 500);
})();
</script>
