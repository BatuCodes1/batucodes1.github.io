<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>YKS Fizik Formülleri</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Crimson+Pro:ital,wght@0,300;0,600;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="logo">φ<span>YKS</span>.fizik</div>
  <div class="header-center">
    <div class="search-bar">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Formül veya konu ara...">
    </div>
  </div>
  <div class="header-right">
    <div class="welcome-type" id="welcomeType"></div>
  </div>
</header>

<div class="hero">
  <div class="hero-glow"></div>
  <h1>YKS Fizik<br><em>Tüm Formüller</em></h1>
  <p>Bu sitenin tasarımı, kodlaması Batuhan Sarısakal tarafından yapılmıştır.</p>
  <div class="stats-row">
    <div class="stat"><span class="stat-num" id="totalCount">0</span><span class="stat-label">Formül</span></div>
    <div class="stat"><span class="stat-num" id="topicCount">0</span><span class="stat-label">Konu</span></div>
    <div class="stat"><span class="stat-num" id="bookmarkCount">0</span><span class="stat-label">Kaydedilen</span></div>
  </div>
</div>

<div class="main-layout">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="content" id="mainContent"></main>
</div>

<footer>
  <span class="footer-text">Created by Batuhan</span>
</footer>

<div class="modal-overlay" id="quizModal">
  <div class="modal">
    <button class="close-modal" onclick="closeQuiz()">✕</button>
    <h3>⚡ Hızlı Quiz</h3>
    <p class="modal-q" id="quizQ"></p>
    <div class="modal-formula" id="quizFormula"></div>
    <div class="quiz-options" id="quizOptions"></div>
    <div class="quiz-result" id="quizResult"></div>
    <div class="modal-btns">
      <button class="modal-btn next" id="nextBtn" onclick="nextQuiz()">Sonraki →</button>
      <button class="modal-btn exit" id="exitBtn" onclick="closeQuiz()">Çıkış</button>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
